<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Works</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #22c55e;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }
    a.button {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }
    a.button:hover { transform: translateY(-1px); }
    a.primary {
      background: var(--accent);
      color: #082f49;
    }
    a.secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .note {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.95rem;
      color: var(--muted);
    }
    .note strong { color: var(--text); }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Digital Works</div>
    <h1>Work in progress.</h1>
    <p>
      This domain will be used for multiple projects. For now, the live sailing dashboard is available below.
    </p>

    <div class="actions">
      <a class="button primary" href="/sailing/">Open sailing dashboard</a>
      <a class="button secondary" href="https://fa85074d.sailing-dashboard.pages.dev">Preview deployment</a>
    </div>

    <div class="note">
      <strong>Planned:</strong> root site content for Digital Works, with the sailing dashboard living at <code>/sailing</code>.
    </div>
  </main>
</body>
</html>
